        }

<body>

        <h2>📌 SQL注入基础笔记</h2>
        <div class="note-box">
            <p>1. 数字型注入：无引号包裹，直接拼接 and / union 语句</p>
            <p>2. 字符型注入：需要闭合单引号/双引号/括号组合符号</p>
            <p>3. 注释符 --+ 用来屏蔽后端多余SQL代码，避免语法报错</p>
        </div>
