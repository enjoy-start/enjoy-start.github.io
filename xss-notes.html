            <h1>XSS跨站脚本漏洞笔记</h1>
            <h2>一、漏洞原理</h2>
            <p>后端未过滤用户输入，直接将用户提交的JS代码渲染到页面，导致恶意脚本执行，窃取Cookie、劫持页面。</p>
            <h2>二、基础测试Payload（自行增减）</h2>
            <p>&lt;script&gt;alert(1)&lt;/script&gt;</p>
            <h2>三、防御手段</h2>
            <p>1. 前端转义特殊字符 &lt; &gt; " '</p>
            <p>2. 后端过滤危险标签与关键字</p>
            <p>3. 配置CSP内容安全策略</p>
